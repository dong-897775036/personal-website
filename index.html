<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妆点 - 首页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 顶部 Logo 和导航 -->
        <header class="header">
            <h1 class="logo">妆点</h1>
            <nav class="nav">
                <a href="#" class="nav-link active">首页</a>
            </nav>
        </header>

        <!-- 主内容区 -->
        <main class="main">
            <!-- 主轮播区域 -->
            <section class="hero">
                <button class="hero-arrow hero-prev" aria-label="上一个">◀</button>
                <div class="hero-content" id="heroContent">
                    <span class="placeholder-text">作品</span>
                </div>
                <button class="hero-arrow hero-next" aria-label="下一个">▶</button>
            </section>

            <!-- 缩略图网格 -->
            <section class="thumbnails" id="thumbnails">
                <div class="thumbnail active" data-index="0">作品</div>
                <div class="thumbnail" data-index="1">作品</div>
                <div class="thumbnail" data-index="2">作品</div>
                <div class="thumbnail" data-index="3">作品</div>
                <div class="thumbnail" data-index="4">作品</div>
                <div class="thumbnail" data-index="5">作品</div>
            </section>

            <!-- 分隔线 -->
            <div class="divider"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
